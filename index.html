<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOZI KHAN TEMP MAIL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-md mx-auto pt-10 text-center">
        <h1 class="text-3xl font-bold mb-6 uppercase tracking-tighter">
            🔥 <span class="text-blue-400">Fozi Khan</span> <br>Temp Mail Pro
        </h1>

        <div class="glass p-6 rounded-2xl mb-6">
            <input id="emailAddr" type="text" readonly 
                class="w-full bg-slate-900 border border-slate-700 text-blue-400 text-center font-mono p-4 rounded-xl mb-4" 
                value="CLICK NEW TO START">
            
            <div class="flex gap-2">
                <button onclick="copyEmail()" class="flex-1 bg-blue-600 p-3 rounded-xl font-bold"><i class="fas fa-copy"></i> Copy</button>
                <button onclick="generateNew()" class="flex-1 bg-slate-700 p-3 rounded-xl font-bold"><i class="fas fa-sync"></i> New</button>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden text-left">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <span class="font-bold">📩 Inbox</span>
                <span id="status" class="text-xs text-slate-400 font-mono italic">Offline</span>
            </div>
            <div id="mailList" class="min-h-[200px] p-4 text-center text-slate-500 text-sm">
                No mails yet.
            </div>
        </div>
    </div>

    <div id="viewModal" class="fixed inset-0 bg-black/90 hidden z-50 p-4 overflow-y-auto">
        <div class="bg-white text-black p-4 rounded-xl max-w-lg mx-auto mt-20">
            <button onclick="closeMail()" class="float-right text-red-500 font-bold">CLOSE</button>
            <div id="mailContent" class="mt-8"></div>
        </div>
    </div>

    <script>
        let user = "", domain = "";
        const api = "https://www.1secmail.com/api/v1/";

        async function generateNew() {
            document.getElementById('emailAddr').value = "Generating...";
            try {
                const r = await fetch(api + "?action=genEmail&count=1");
                const d = await r.json();
                const full = d[0];
                [user, domain] = full.split('@');
                document.getElementById('emailAddr').value = full;
                document.getElementById('status').innerText = "Online - Checking...";
                document.getElementById('mailList').innerText = "Waiting for messages...";
                checkInbox();
            } catch (e) {
                document.getElementById('emailAddr').value = "API Error! Refresh Page.";
            }
        }

        async function checkInbox() {
            if (!user) return;
            try {
                const r = await fetch(`${api}?action=getMessages&login=${user}&domain=${domain}`);
                const mails = await r.json();
                if (mails.length > 0) {
                    let html = "";
                    mails.forEach(m => {
                        html += `<div onclick="readMail(${m.id})" class="p-3 border-b border-slate-700 hover:bg-slate-800 cursor-pointer">
                            <div class="text-blue-400 font-bold text-xs capitalize">${m.from}</div>
                            <div class="truncate text-white">${m.subject}</div>
                        </div>`;
                    });
                    document.getElementById('mailList').innerHTML = html;
                }
            } catch (e) { console.log("Refresh error"); }
            setTimeout(checkInbox, 5000);
        }

        async function readMail(id) {
            const r = await fetch(`${api}?action=readMessage&login=${user}&domain=${domain}&id=${id}`);
            const d = await r.json();
            document.getElementById('mailContent').innerHTML = `<b>From:</b> ${d.from}<br><b>Subject:</b> ${d.subject}<hr class="my-4"> ${d.htmlBody || d.textBody}`;
            document.getElementById('viewModal').classList.remove('hidden');
        }

        function closeMail() { document.getElementById('viewModal').classList.add('hidden'); }

        function copyEmail() {
            const copyText = document.getElementById("emailAddr");
            navigator.clipboard.writeText(copyText.value);
            alert("Copied!");
        }
    </script>
</body>
</html>
