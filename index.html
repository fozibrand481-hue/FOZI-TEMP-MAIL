<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOZI KHAN TEMP MAIL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .active-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-md mt-6">
        <h1 class="text-3xl font-bold text-center mb-6 uppercase tracking-widest text-blue-500">🔥 FOZI KHAN <br><span class="text-white text-2xl">TEMP MAIL PRO</span></h1>

        <div class="glass p-6 rounded-3xl mb-4 text-center shadow-2xl">
            <div id="emailBox" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-blue-400 font-mono text-lg mb-4 break-all italic">Click "NEW MAIL" To Start</div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyEmail()" class="bg-blue-600 p-3 rounded-xl font-bold active:scale-95 transition hover:bg-blue-500"><i class="fas fa-copy"></i> Copy</button>
                <button id="genBtn" onclick="createNewMail()" class="bg-slate-700 p-3 rounded-xl font-bold active:scale-95 transition hover:bg-slate-600"><i class="fas fa-plus"></i> New Mail</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden min-h-[400px] flex flex-col shadow-2xl">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 font-bold flex justify-between items-center">
                <span>📩 Inbox</span>
                <button onclick="fetchMails()" id="refreshBtn" class="text-xs bg-blue-600 px-4 py-2 rounded-full hover:bg-blue-500 active:scale-90 transition font-bold flex items-center gap-2">
                    <i id="refreshIcon" class="fas fa-sync-alt"></i> Refresh Inbox
                </button>
            </div>
            
            <div id="statusIndicator" class="px-4 py-2 text-[11px] text-center border-b border-slate-800 text-slate-500 bg-slate-900/50">
                System: <span class="text-red-500 font-bold">OFFLINE</span>
            </div>

            <div id="mailList" class="p-4 flex flex-col gap-3 flex-1 overflow-y-auto">
                <div id="noMails" class="text-center text-slate-500 mt-12 italic">
                    <i class="fas fa-envelope-open text-4xl mb-4 opacity-20"></i><br>
                    No messages yet. <br>OTP will appear here automatically.
                </div>
            </div>
        </div>
    </div>

    <div id="mailModal" class="fixed inset-0 bg-black/95 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white text-black p-6 rounded-2xl w-full max-w-lg shadow-2xl overflow-y-auto max-h-[85vh]">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 id="m_subject" class="text-xl font-bold text-blue-600 truncate mr-4"></h2>
                <button onclick="closeModal()" class="text-red-500 font-bold text-2xl hover:scale-110">&times;</button>
            </div>
            <div id="modalContent" class="text-gray-800 text-sm leading-relaxed"></div>
        </div>
    </div>

    <script>
        let currentToken = "";
        let currentEmail = "";

        async function createNewMail() {
            const btn = document.getElementById('genBtn');
            btn.innerHTML = '<i class="fas fa-sync-alt loading-spin"></i> ...';
            document.getElementById('emailBox').innerText = "Generating...";

            try {
                // Get Domain
                const domainRes = await fetch('https://api.mail.tm/domains');
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0].domain;

                // Create Account
                const randomUser = Math.random().toString(36).substring(2, 12);
                const password = "password123";
                currentEmail = `${randomUser}@${domain}`;

                await fetch('https://api.mail.tm/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: currentEmail, password: password })
                });

                // Get Token
                const tokenRes = await fetch('https://api.mail.tm/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: currentEmail, password: password })
                });
                const tokenData = await tokenRes.json();
                currentToken = tokenData.token;

                document.getElementById('emailBox').innerText = currentEmail;
                document.getElementById('statusIndicator').innerHTML = `<span class="active-dot"></span> <span class="text-green-400 font-bold uppercase tracking-tighter">Live Monitoring Enabled</span>`;
                document.getElementById('mailList').innerHTML = '<div class="text-center text-slate-500 mt-12">Waiting for OTP... (Auto-Checking)</div>';
                
                btn.innerHTML = '<i class="fas fa-plus"></i> New Mail';
                
                // Start Auto-Check every 5 seconds
                clearInterval(window.sync);
                window.sync = setInterval(fetchMails, 5000);
            } catch (err) {
                document.getElementById('emailBox').innerText = "API Error! Refresh Page.";
                btn.innerHTML = '<i class="fas fa-plus"></i> New Mail';
            }
        }

        async function fetchMails() {
            if (!currentToken) return;
            
            const icon = document.getElementById('refreshIcon');
            if(icon) icon.classList.add('loading-spin');

            try {
                const res = await fetch(`https://api.mail.tm/messages?t=${new Date().getTime()}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                const mails = data['hydra:member'];

                if (mails.length > 0) {
                    let html = "";
                    mails.forEach(m => {
                        html += `
                        <div onclick="readMail('${m.id}')" class="p-4 bg-slate-800/80 rounded-2xl cursor-pointer hover:bg-slate-700 border-l-4 border-l-blue-500 transition shadow-lg animate-pulse">
                            <div class="text-blue-400 text-[10px] font-bold mb-1 uppercase">${m.from.address}</div>
                            <div class="text-sm font-bold text-white truncate">${m.subject || '(No Subject)'}</div>
                            <div class="text-[9px] text-slate-500 mt-2 text-right italic font-bold">New Message Received</div>
                        </div>`;
                    });
                    document.getElementById('mailList').innerHTML = html;
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            } catch (e) {
                console.error("Refresh Error");
            } finally {
                if(icon) setTimeout(() => icon.classList.remove('loading-spin'), 800);
            }
        }

        async function readMail(id) {
            const res = await fetch(`https://api.mail.tm/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await res.json();
            document.getElementById('m_subject').innerText = data.subject || 'No Subject';
            document.getElementById('modalContent').innerHTML = `
                <div class="bg-gray-100 p-2 rounded mb-4 text-[10px] text-gray-600">From: ${data.from.address}</div>
                <div class="otp-body">${data.html || `<pre class="whitespace-pre-wrap">${data.text}</pre>`}</div>
            `;
            document.getElementById('mailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('mailModal').classList.add('hidden'); }
        
        function copyEmail() {
            const email = document.getElementById('emailBox').innerText;
            if(email.includes('@')) {
                navigator.clipboard.writeText(email).then(() => {
                    alert("Email Copied: " + email);
                });
            }
        }
    </script>
</body>
</html>
