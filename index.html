<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOZI KHAN TEMP MAIL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-md mt-10">
        <h1 class="text-3xl font-bold text-center mb-6 uppercase tracking-widest">🔥 FOZI KHAN <br><span class="text-blue-500 text-2xl">TEMP MAIL PRO</span></h1>

        <div class="glass p-6 rounded-3xl mb-6 text-center shadow-2xl">
            <div id="emailBox" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-blue-400 font-mono text-lg mb-4">Click "NEW" To Start</div>
            <div class="flex gap-2">
                <button onclick="copyEmail()" class="flex-1 bg-blue-600 p-4 rounded-xl font-bold active:scale-95 transition">Copy</button>
                <button id="genBtn" onclick="generateNew()" class="flex-1 bg-slate-700 p-4 rounded-xl font-bold active:scale-95 transition">New</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden min-h-[250px]">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 font-bold flex justify-between">
                <span>📩 Inbox</span>
                <span id="status" class="text-red-500 text-xs">Offline</span>
            </div>
            <div id="mailList" class="p-4 text-center text-slate-500">No messages yet.</div>
        </div>
    </div>

    <script>
        let login = "", domain = "";
        // Proxy added to bypass security blocks
        const PROXY = "https://api.allorigins.win/raw?url=";
        const API = "https://www.1secmail.com/api/v1/";

        async function generateNew() {
            const btn = document.getElementById('genBtn');
            btn.innerText = "Loading...";
            try {
                const res = await fetch(PROXY + encodeURIComponent(API + "?action=genEmail&count=1"));
                const data = await res.json();
                const full = data[0];
                [login, domain] = full.split('@');
                document.getElementById('emailBox').innerText = full;
                document.getElementById('status').innerText = "Checking...";
                document.getElementById('status').classList.replace('text-red-500', 'text-green-500');
                btn.innerText = "New";
                startSync();
            } catch (e) {
                alert("Slow Internet! Try Again.");
                btn.innerText = "New";
            }
        }

        function startSync() {
            clearInterval(window.itv);
            window.itv = setInterval(fetchMails, 5000);
        }

        async function fetchMails() {
            if(!login) return;
            try {
                const res = await fetch(PROXY + encodeURIComponent(`${API}?action=getMessages&login=${login}&domain=${domain}`));
                const mails = await res.json();
                if(mails.length > 0) {
                    let html = "";
                    mails.forEach(m => {
                        html += `<div class="p-3 border-b border-slate-700 text-left">
                            <div class="text-blue-400 text-xs font-bold">${m.from}</div>
                            <div class="text-sm truncate">${m.subject}</div>
                        </div>`;
                    });
                    document.getElementById('mailList').innerHTML = html;
                }
            } catch (e) { console.log("Sync error"); }
        }

        function copyEmail() {
            const text = document.getElementById('emailBox').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
