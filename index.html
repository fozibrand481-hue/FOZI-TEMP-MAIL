<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOZI KHAN TEMP MAIL ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .otp-animate { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-md">
        <div class="text-center my-8">
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter">FOZI KHAN</h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Ultimate OTP Bypass System</p>
        </div>

        <div class="glass-card p-6 shadow-2xl mb-6">
            <div id="emailBox" class="bg-black/40 border border-white/10 p-4 rounded-2xl text-blue-300 font-mono text-center text-lg mb-4 break-all shadow-inner">
                Waiting for Command...
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="copyEmail()" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-blue-900/20">COPY</button>
                <button id="genBtn" onclick="createNewMail()" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-emerald-900/20">NEW MAIL</button>
            </div>
        </div>

        <div class="glass-card overflow-hidden shadow-2xl flex flex-col min-h-[400px]">
            <div class="bg-white/5 p-4 border-b border-white/10 flex justify-between items-center">
                <span class="font-black text-sm uppercase tracking-widest"><i class="fas fa-inbox mr-2"></i> Live Inbox</span>
                <button onclick="fetchMails()" class="text-[10px] bg-white/10 px-3 py-1.5 rounded-full hover:bg-white/20 transition-all font-bold">
                    <i id="refIcon" class="fas fa-sync-alt mr-1"></i> FORCE REFRESH
                </button>
            </div>
            
            <div id="status" class="py-2 text-center text-[10px] bg-black/20 text-slate-500 font-bold italic">
                Status: <span class="text-red-500">OFFLINE</span>
            </div>

            <div id="mailList" class="p-4 space-y-3 overflow-y-auto flex-1">
                <div class="text-center text-slate-600 mt-20">
                    <i class="fas fa-satellite-dish text-5xl mb-4 opacity-10"></i>
                    <p class="text-sm font-medium">Listening for incoming OTPs...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-50 p-6 flex items-center justify-center">
        <div class="bg-white text-slate-900 p-8 rounded-3xl w-full max-w-lg">
            <div class="flex justify-between items-start mb-6">
                <h2 id="mSubject" class="text-2xl font-black text-blue-600 leading-tight"></h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-3xl">&times;</button>
            </div>
            <div id="mContent" class="text-sm overflow-x-auto border-t pt-4 leading-relaxed"></div>
        </div>
    </div>

    <script>
        let token = "";
        let email = "";

        async function createNewMail() {
            const btn = document.getElementById('genBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch spin"></i>';
            document.getElementById('emailBox').innerText = "Switching Domains...";

            try {
                const domRes = await fetch('https://api.mail.tm/domains');
                const domData = await domRes.json();
                const domain = domData['hydra:member'][Math.floor(Math.random() * domData['hydra:member'].length)].domain;

                const user = Math.random().toString(36).substring(2, 12);
                const pass = "fozikhan123";
                email = `${user}@${domain}`;

                await fetch('https://api.mail.tm/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });

                const tokRes = await fetch('https://api.mail.tm/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });
                const tokData = await tokRes.json();
                token = tokData.token;

                document.getElementById('emailBox').innerText = email;
                document.getElementById('status').innerHTML = 'System: <span class="text-emerald-500 font-black animate-pulse">● ONLINE & MONITORING</span>';
                document.getElementById('mailList').innerHTML = '<div class="text-center text-emerald-500/50 mt-10 font-bold italic">Waiting for sender to hit send...</div>';
                
                btn.innerText = "NEW MAIL";
                clearInterval(window.itv);
                window.itv = setInterval(fetchMails, 4000);
            } catch (e) {
                document.getElementById('emailBox').innerText = "Limit Reached! Wait 1 Min.";
                btn.innerText = "NEW MAIL";
            }
        }

        async function fetchMails() {
            if (!token) return;
            const icon = document.getElementById('refIcon');
            icon.classList.add('spin');

            try {
                const res = await fetch(`https://api.mail.tm/messages?t=${Date.now()}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const msgs = data['hydra:member'];

                if (msgs.length > 0) {
                    let h = "";
                    msgs.forEach(m => {
                        h += `<div onclick="read('${m.id}')" class="p-5 bg-blue-600 rounded-2xl cursor-pointer shadow-xl border-b-4 border-blue-800 transition-all hover:translate-y-[-2px] active:translate-y-[2px]">
                            <div class="text-[10px] font-black opacity-80 uppercase tracking-tighter mb-1">${m.from.address}</div>
                            <div class="font-black text-white text-lg">${m.subject || 'NEW OTP RECEIVED'}</div>
                            <div class="text-right text-[10px] mt-2 font-bold opacity-50">${new Date().toLocaleTimeString()}</div>
                        </div>`;
                    });
                    document.getElementById('mailList').innerHTML = h;
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                }
            } catch (e) {}
            setTimeout(() => icon.classList.remove('spin'), 500);
        }

        async function read(id) {
            const res = await fetch(`https://api.mail.tm/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const d = await res.json();
            document.getElementById('mSubject').innerText = d.subject;
            document.getElementById('mContent').innerHTML = d.html || `<pre>${d.text}</pre>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function copyEmail() {
            if(email) {
                navigator.clipboard.writeText(email);
                alert("COPIED!");
            }
        }
    </script>
</body>
</html>
