<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOZI KHAN TEMP MAIL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-md mt-10">
        <h1 class="text-3xl font-bold text-center mb-6 uppercase tracking-widest">🔥 FOZI KHAN <br><span class="text-blue-500 text-2xl">TEMP MAIL PRO</span></h1>

        <div class="glass p-6 rounded-3xl mb-6 text-center shadow-2xl">
            <div id="emailBox" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-blue-400 font-mono text-lg mb-4 break-all italic">Click "NEW" To Generate</div>
            <div class="flex gap-2">
                <button onclick="copyEmail()" class="flex-1 bg-blue-600 p-4 rounded-xl font-bold active:scale-95 transition hover:bg-blue-500">Copy</button>
                <button id="genBtn" onclick="createNewMail()" class="flex-1 bg-slate-700 p-4 rounded-xl font-bold active:scale-95 transition hover:bg-slate-600">New</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden min-h-[300px]">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 font-bold flex justify-between items-center">
                <span>📩 Inbox</span>
                <span id="statusIndicator" class="text-xs text-slate-500 italic">Offline</span>
            </div>
            <div id="mailList" class="p-4 flex flex-col gap-3">
                <div id="noMails" class="text-center text-slate-500 mt-10 italic">No messages yet.</div>
            </div>
        </div>
    </div>

    <div id="mailModal" class="fixed inset-0 bg-black/90 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white text-black p-6 rounded-2xl w-full max-w-lg shadow-2xl overflow-y-auto max-h-[80vh]">
            <button onclick="closeModal()" class="float-right text-red-500 font-bold">CLOSE</button>
            <div id="modalContent" class="mt-6 text-sm"></div>
        </div>
    </div>

    <script>
        let currentToken = "";
        let currentEmail = "";

        async function createNewMail() {
            const btn = document.getElementById('genBtn');
            btn.innerHTML = '<i class="fas fa-sync-alt loading-spin"></i>';
            document.getElementById('emailBox').innerText = "Generating...";

            try {
                // Get Domain
                const domainRes = await fetch('https://api.mail.tm/domains');
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0].domain;

                // Create Unique Account
                const randomUser = Math.random().toString(36).substring(2, 10);
                const password = "password123";
                currentEmail = `${randomUser}@${domain}`;

                await fetch('https://api.mail.tm/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: currentEmail, password: password })
                });

                // Get Token
                const tokenRes = await fetch('https://api.mail.tm/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: currentEmail, password: password })
                });
                const tokenData = await tokenRes.json();
                currentToken = tokenData.token;

                document.getElementById('emailBox').innerText = currentEmail;
                document.getElementById('statusIndicator').innerHTML = '<span class="text-green-500 font-bold tracking-tighter uppercase">● Live Monitoring</span>';
                btn.innerText = "New";
                
                startChecking();
            } catch (err) {
                document.getElementById('emailBox').innerText = "API Error! Retry.";
                btn.innerText = "New";
            }
        }

        function startChecking() {
            clearInterval(window.itv);
            window.itv = setInterval(fetchMails, 5000);
        }

        async function fetchMails() {
            if (!currentToken) return;
            try {
                const res = await fetch('https://api.mail.tm/messages', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                const mails = data['hydra:member'];

                if (mails.length > 0) {
                    document.getElementById('noMails').classList.add('hidden');
                    let html = "";
                    mails.forEach(m => {
                        html += `<div onclick="readMail('${m.id}')" class="p-3 bg-slate-800/80 rounded-xl cursor-pointer hover:border-blue-500 border border-transparent transition mb-2">
                            <div class="text-blue-400 text-xs font-bold truncate">${m.from.address}</div>
                            <div class="text-sm font-medium text-white truncate">${m.subject}</div>
                        </div>`;
                    });
                    document.getElementById('mailList').innerHTML = html;
                }
            } catch (e) { console.error("Sync error"); }
        }

        async function readMail(id) {
            const res = await fetch(`https://api.mail.tm/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await res.json();
            document.getElementById('modalContent').innerHTML = `
                <h2 class="text-xl font-bold mb-2">${data.subject}</h2>
                <p class="text-xs text-gray-400 mb-4">From: ${data.from.address}</p>
                <div class="border-t pt-4 text-gray-800">${data.html || data.text}</div>
            `;
            document.getElementById('mailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('mailModal').classList.add('hidden'); }
        
        function copyEmail() {
            const email = document.getElementById('emailBox').innerText;
            if(email.includes('@')) {
                navigator.clipboard.writeText(email);
                alert("Email Copied!");
            }
        }
    </script>
</body>
</html>
