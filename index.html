<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOZI KHAN TEMP MAIL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-md mt-6">
        <h1 class="text-3xl font-bold text-center mb-6 uppercase tracking-widest text-blue-500">🔥 FOZI KHAN <br><span class="text-white text-2xl">TEMP MAIL PRO</span></h1>

        <div class="glass p-6 rounded-3xl mb-4 text-center shadow-2xl">
            <div id="emailBox" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-blue-400 font-mono text-lg mb-4 break-all italic">Click "NEW" To Start</div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyEmail()" class="bg-blue-600 p-3 rounded-xl font-bold active:scale-95 transition hover:bg-blue-500"><i class="fas fa-copy"></i> Copy</button>
                <button id="genBtn" onclick="createNewMail()" class="bg-slate-700 p-3 rounded-xl font-bold active:scale-95 transition hover:bg-slate-600"><i class="fas fa-plus"></i> New Mail</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden min-h-[350px] flex flex-col">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 font-bold flex justify-between items-center">
                <span>📩 Inbox</span>
                <button onclick="fetchMails()" id="refreshBtn" class="text-xs bg-blue-600 px-3 py-1 rounded-full hover:bg-blue-500 transition">
                    <i id="refreshIcon" class="fas fa-sync-alt"></i> Refresh Inbox
                </button>
            </div>
            
            <div id="statusIndicator" class="px-4 py-2 text-[10px] text-center border-b border-slate-800 text-slate-500">Offline</div>

            <div id="mailList" class="p-4 flex flex-col gap-3 flex-1 overflow-y-auto">
                <div id="noMails" class="text-center text-slate-500 mt-10 italic">No messages yet. Click Refresh to check.</div>
            </div>
        </div>
    </div>

    <div id="mailModal" class="fixed inset-0 bg-black/95 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white text-black p-6 rounded-2xl w-full max-w-lg shadow-2xl overflow-y-auto max-h-[85vh]">
            <button onclick="closeModal()" class="float-right text-red-500 font-bold text-lg">&times; CLOSE</button>
            <div id="modalContent" class="mt-8"></div>
        </div>
    </div>

    <script>
        let currentToken = "";
        let currentEmail = "";

        async function createNewMail() {
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            document.getElementById('emailBox').innerText = "Generating...";

            try {
                const domainRes = await fetch('https://api.mail.tm/domains');
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0].domain;

                const randomUser = Math.random().toString(36).substring(2, 12);
                const password = "password123";
                currentEmail = `${randomUser}@${domain}`;

                await fetch('https://api.mail.tm/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: currentEmail, password: password })
                });

                const tokenRes = await fetch('https://api.mail.tm/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: currentEmail, password: password })
                });
                const tokenData = await tokenRes.json();
                currentToken = tokenData.token;

                document.getElementById('emailBox').innerText = currentEmail;
                document.getElementById('statusIndicator').innerHTML = '<span class="text-green-500 font-bold">● LIVE: ' + currentEmail + '</span>';
                document.getElementById('mailList').innerHTML = '<div class="text-center text-slate-500 mt-10">Inbox is empty. Waiting for mails...</div>';
                
                btn.disabled = false;
                fetchMails();
            } catch (err) {
                document.getElementById('emailBox').innerText = "API Error! Try Again.";
                btn.disabled = false;
            }
        }

        async function fetchMails() {
            if (!currentToken) {
                alert("Please generate a 'New Mail' first!");
                return;
            }
            
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('loading-spin');

            try {
                const res = await fetch('https://api.mail.tm/messages', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                const mails = data['hydra:member'];

                if (mails.length > 0) {
                    let html = "";
                    mails.forEach(m => {
                        html += `<div onclick="readMail('${m.id}')" class="p-4 bg-slate-800/80 rounded-2xl cursor-pointer hover:border-blue-500 border border-transparent transition shadow-lg border-l-4 border-l-blue-500">
                            <div class="text-blue-400 text-xs font-bold mb-1 uppercase tracking-tighter">${m.from.address}</div>
                            <div class="text-sm font-semibold text-white truncate">${m.subject || '(No Subject)'}</div>
                            <div class="text-[9px] text-slate-500 mt-2 text-right">${new Date(m.createdAt).toLocaleTimeString()}</div>
                        </div>`;
                    });
                    document.getElementById('mailList').innerHTML = html;
                } else {
                    document.getElementById('mailList').innerHTML = '<div class="text-center text-slate-500 mt-10 italic">Inbox is still empty...</div>';
                }
            } catch (e) {
                console.error("Refresh failed");
            } finally {
                setTimeout(() => icon.classList.remove('loading-spin'), 500);
            }
        }

        async function readMail(id) {
            const res = await fetch(`https://api.mail.tm/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await res.json();
            document.getElementById('modalContent').innerHTML = `
                <div class="mb-4">
                    <h2 class="text-xl font-bold text-blue-600">${data.subject || 'No Subject'}</h2>
                    <p class="text-xs text-gray-500 mt-1"><b>From:</b> ${data.from.address}</p>
                </div>
                <hr class="mb-4">
                <div class="text-gray-800 overflow-x-auto text-sm leading-relaxed">${data.html || data.text}</div>
            `;
            document.getElementById('mailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('mailModal').classList.add('hidden'); }
        
        function copyEmail() {
            const email = document.getElementById('emailBox').innerText;
            if(email.includes('@')) {
                navigator.clipboard.writeText(email).then(() => alert("Email Copied!"));
            }
        }
    </script>
</body>
</html>
